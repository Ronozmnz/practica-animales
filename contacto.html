<!DOCTYPE html>
<html lang="es">
    <head>
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="icon" href="./img/animales/logo_animales.jpg" type="image/jpeg">
        <title>Contacto - Proyecto Animales</title>
        <link rel="stylesheet" href="./css/estilo.css">
    </head>    
    <body>
        <nav id="inicio">            
            <ul>                
                <li><a href="index.html">Inicio</a></li>
                <li><a href="vertebrados.html">Animales Vertebrados</a></li>
                <li><a href="invertebrados.html">Animales Invertebrados</a></li>
                <li><a href="contacto.html">Contacto</a></li>
            </ul>
        </nav>        
        <main>
            <header class="bordenegro">
                <h1 class="cajacss">Contacto</h1>
                <p>¿Tienes alguna duda o sugerencia? ¡Escríbenos!</p>
            </header>

            <section id="contacto-seccion">
                <form action="#" method="post" class="formulario-contacto">
                    <div class="grupo-input">
                        <label for="nombre">Nombre completo:</label>
                        <input type="text" id="nombre" name="nombre" placeholder="Tu nombre..." required>
                    </div>

                    <div class="grupo-input">
                        <label for="email">Correo electrónico:</label>
                        <input type="email" id="email" name="email" placeholder="tu@email.com" required>
                    </div>

                    <div class="grupo-input">
                        <label for="mensaje">Mensaje:</label>
                        <textarea id="mensaje" name="mensaje" rows="5" placeholder="Escribe tu mensaje aquí..." required></textarea>
                    </div>

                    <button type="submit" class="boton-enviar">Enviar Mensaje</button>
                </form>
            </section>            
        </main>        
        <footer>
            <div class="redes-sociales">
                <a href="https://www.facebook.com"><img src="./img/footer/facebook.png" alt="Facebook"></a>
                <a href="https://www.instagram.com"><img src="./img/footer/instagram.png" alt="Instagram"></a>
                <a href="https://www.youtube.com"><img src="./img/footer/youtube.png" alt="YouTube"></a>
            </div>
            <p>© 2026 - Página Educativa de Animales</p>
        </footer>
    </body>
</html>
